      summary: Obter plano
      operationId: plansShow
      security:
        - sanctum: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonDataObject"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    put:
      tags: [Planos]
      summary: Atualizar plano
      operationId: plansUpdate
      security:
        - sanctum: []
      requestBody:
