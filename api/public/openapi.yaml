  /subscriptions/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      tags: [Assinaturas]
      summary: Obter assinatura
      description: Inclui `enrollment.student`, `plan` e `invoices`.
      operationId: subscriptionsShow
      security:
        - sanctum: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonDataObject"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    put:
      tags: [Assinaturas]
      summary: Atualizar assinatura (cancelar)
      description: |
        Corpo aceito atualmente: `status` = `canceled` (único valor permitido pela validação).
      operationId: subscriptionsUpdate
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionUpdate"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonDataObject"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
