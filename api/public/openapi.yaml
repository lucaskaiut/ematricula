openapi: 3.0.3
info:
  title: API eMatrícula — Usuários
  description: |
    Especificação das rotas HTTP definidas em `routes/api.php`. A URL base em `servers` já inclui o
    prefixo `/api` usado pelo Laravel; os caminhos abaixo são relativos a essa base (sem repetir `api`).

    Rotas autenticadas usam **Laravel Sanctum** (`Authorization: Bearer <token>`) e o middleware
    `InitializeCompany`: o usuário autenticado precisa estar vinculado a uma empresa; caso contrário
    a API pode responder com **404** (“Company not found”).
  version: 1.0.0

servers:
  - url: http://localhost:8080/api
    description: Docker Compose (nginx, HTTP na porta padrão)
  - url: http://localhost/api
    description: Ambiente local (ajuste host/porta se necessário)

tags:
  - name: Usuários
    description: Cadastro, autenticação e gestão de usuários

paths:
  /user/me:
    get:
      tags: [Usuários]
      summary: Obter o usuário autenticado
      description: |
        Retorna o perfil do usuário associado ao token Bearer. Útil para validar sessão e obter dados
        atualizados.
      operationId: userMe
      security:
        - sanctum: []
      responses:
        "200":
          description: Usuário encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWrapped"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /users:
    get:
      tags: [Usuários]
      summary: Listar usuários (paginado)
      description: |
        Aceita filtros e ordenação na query string (padrão Laravel), por exemplo:
        `filters[name]=João`, `orderBy[id]=desc`, `per_page=15`.
      operationId: usersIndex
      security:
        - sanctum: []
      parameters:
        - name: filters
          in: query
          description: Critérios de filtro (chave/valor por campo).
          schema:
            type: object
            additionalProperties: true
          style: form
          explode: true
        - name: orderBy
          in: query
          description: Ordenação por campo (`asc` ou `desc`).
          schema:
            type: object
            additionalProperties:
              type: string
              enum: [asc, desc]
          style: form
          explode: true
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 15
      responses:
        "200":
          description: Coleção paginada (`UserResource`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPaginator"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    post:
      tags: [Usuários]
      summary: Criar usuário
      operationId: usersStore
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserWrite"
      responses:
        "201":
          description: Usuário criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWrapped"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
        "422":
          $ref: "#/components/responses/ErroValidacao"

  /users/register:
    post:
      tags: [Usuários]
      summary: Registrar empresa e primeiro usuário
      operationId: usersRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRegisterBody"
      responses:
        "201":
          description: Usuário criado (sem token no recurso, salvo lógica adicional)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWrapped"
        "422":
          $ref: "#/components/responses/ErroValidacao"
        "500":
          description: Erro interno do servidor (ex. credenciais ou falha não mapeada)

  /users/login:
    post:
      tags: [Usuários]
      summary: Login (token Sanctum)
      operationId: usersLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserLoginBody"
      responses:
        "201":
          description: Autenticação bem-sucedida; o campo `data.token` contém o bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWrapped"
        "422":
          $ref: "#/components/responses/ErroValidacao"
        "500":
          description: Credenciais inválidas ou erro não tratado como 401

  /users/{id}:
    parameters:
      - $ref: "#/components/parameters/UserId"
    get:
      tags: [Usuários]
      summary: Obter usuário por ID
      operationId: usersShow
      security:
        - sanctum: []
      responses:
        "200":
          description: Recurso encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWrapped"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    put:
      tags: [Usuários]
      summary: Atualizar usuário
      description: |
        O campo `password` é opcional na atualização; quando omitido ou nulo, a senha não é alterada
        pelas regras de validação atuais.
      operationId: usersUpdate
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserWriteUpdate"
      responses:
        "200":
          description: Usuário atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWrapped"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
        "422":
          $ref: "#/components/responses/ErroValidacao"
    delete:
      tags: [Usuários]
      summary: Excluir usuário
      operationId: usersDestroy
      security:
        - sanctum: []
      responses:
        "204":
          description: Sem corpo na resposta
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

components:
  securitySchemes:
    sanctum:
      type: http
      scheme: bearer
      bearerFormat: Token de acesso pessoal (Sanctum)
      description: Token retornado em `POST /users/login` (campo `data.token` no JSON).

  parameters:
    UserId:
      name: id
      in: path
      required: true
      description: Identificador do usuário (chave primária).
      schema:
        type: integer
        minimum: 1

  responses:
    NaoAutorizado:
      description: Não autenticado (Sanctum)
    NaoEncontrado:
      description: Recurso não encontrado ou empresa não resolvida pelo middleware
    ErroValidacao:
      description: Erro de validação do Laravel
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/LaravelValidationError"

  schemas:
    UserAttributes:
      type: object
      required: [id, name, email, created_at, updated_at]
      properties:
        id:
          type: integer
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
        token:
          type: string
          nullable: true
          description: Presente após o login (token em texto plano do Sanctum).
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    UserWrapped:
      description: |
        Resposta de `JsonResource` com `$wrap = 'data'` (padrão no Laravel): o objeto retornado por
        `UserResource::toArray()` fica dentro da chave `data`.
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/UserAttributes"

    UserPaginator:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/UserAttributes"
        links:
          type: object
          properties:
            first:
              type: string
              format: uri
              nullable: true
            last:
              type: string
              format: uri
              nullable: true
            prev:
              type: string
              format: uri
              nullable: true
            next:
              type: string
              format: uri
              nullable: true
        meta:
          type: object
          properties:
            current_page:
              type: integer
            from:
              type: integer
              nullable: true
            last_page:
              type: integer
            path:
              type: string
            per_page:
              type: integer
            to:
              type: integer
              nullable: true
            total:
              type: integer

    UserWrite:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    UserWriteUpdate:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
        password:
          type: string
          nullable: true
          minLength: 8
          description: Opcional; se omitido, mantém a senha atual.

    UserRegisterBody:
      type: object
      required: [company, user]
      properties:
        company:
          type: object
          required: [name, email, phone]
          properties:
            name:
              type: string
              maxLength: 255
            email:
              type: string
              format: email
            phone:
              type: string
              maxLength: 255
        user:
          type: object
          required: [name, email, password]
          properties:
            name:
              type: string
              maxLength: 255
            email:
              type: string
              format: email
            password:
              type: string
              minLength: 8

    UserLoginBody:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LaravelValidationError:
      type: object
      description: Formato usual de validação do Laravel.
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
