    patch:
      tags: [Planos]
      summary: Atualizar plano (parcial)
      operationId: plansPatch
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanWrite"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonDataObject"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
