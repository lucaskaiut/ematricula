          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonDataObject"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
        "422":
          $ref: "#/components/responses/ErroValidacao"
    patch:
      tags: [Matrículas]
      summary: Atualizar matrícula (parcial)
      operationId: enrollmentsPatch
      security:
        - sanctum: []
      requestBody:
        required: true
