      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonDataObject"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
        "422":
          $ref: "#/components/responses/ErroValidacao"
    patch:
      tags: [Modalidades]
      summary: Atualizar modalidade (parcial)
      operationId: modalitiesPatch
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModalityWrite"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonDataObject"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
        "422":
          $ref: "#/components/responses/ErroValidacao"
    delete:
      tags: [Modalidades]
      summary: Excluir modalidade
      operationId: modalitiesDestroy
      security:
        - sanctum: []
      responses:
        "204":
          description: Sem corpo
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /class-groups:
