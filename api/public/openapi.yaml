  /invoices/{invoice}/payments:
    post:
      tags: [Pagamentos]
      summary: Criar pagamento para uma fatura
      description: |
        O gateway é definido pela configuração da empresa `invoice.payment_method` (sem corpo na requisição).
      operationId: invoicePaymentsStore
      security:
        - sanctum: []
      parameters:
        - name: invoice
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "201":
          description: Pagamento criado (`PaymentResource`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentWrapped"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
        "422":
          $ref: "#/components/responses/ErroValidacao"

  /invoices/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      tags: [Faturas]
      summary: Obter fatura
      operationId: invoicesShow
      security:
        - sanctum: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonDataObject"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    put:
      tags: [Faturas]
      summary: Atualizar fatura (marcar paga)
      description: |
        Corpo aceito: `status` = `paid` (conforme `InvoiceUpdateRequest`).
      operationId: invoicesUpdate
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceUpdate"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonDataObject"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
        "422":
          $ref: "#/components/responses/ErroValidacao"
    patch:
      tags: [Faturas]
      summary: Atualizar fatura (marcar paga)
      operationId: invoicesPatch
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceUpdate"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonDataObject"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
        "422":
          $ref: "#/components/responses/ErroValidacao"

  /payments/{payment}/sync-status:
    post:
      tags: [Pagamentos]
      summary: Sincronizar status do pagamento no gateway
      operationId: paymentsSyncStatus
      security:
        - sanctum: []
      parameters:
        - name: payment
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Pagamento atualizado (`PaymentResource`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentWrapped"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /persons:
    get:
      tags: [Pessoas]
      summary: Listar pessoas (paginado)
      operationId: personsIndex
      security:
        - sanctum: []
      parameters:
        - $ref: "#/components/parameters/QueryFilters"
        - $ref: "#/components/parameters/QueryOrderBy"
        - $ref: "#/components/parameters/QueryPerPage"
      responses:
        "200":
          description: Coleção paginada (`PersonResource`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourcePaginator"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    post:
      tags: [Pessoas]
      summary: Criar pessoa (aluno ou professor)
      operationId: personsStore
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonWrite"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonDataObject"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
        "422":
          $ref: "#/components/responses/ErroValidacao"

  /persons/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      tags: [Pessoas]
      summary: Obter pessoa
      operationId: personsShow
      security:
        - sanctum: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonDataObject"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    put:
      tags: [Pessoas]
      summary: Atualizar pessoa
      operationId: personsUpdate
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonWrite"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonDataObject"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
        "422":
          $ref: "#/components/responses/ErroValidacao"
    patch:
      tags: [Pessoas]
      summary: Atualizar pessoa (parcial)
      operationId: personsPatch
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonWrite"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonDataObject"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
        "422":
          $ref: "#/components/responses/ErroValidacao"
    delete:
      tags: [Pessoas]
      summary: Excluir pessoa
      operationId: personsDestroy
      security:
        - sanctum: []
      responses:
        "204":
          description: Sem corpo
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /users:
    get:
      tags: [Usuários]
      summary: Listar usuários (paginado)
      operationId: usersIndex
      security:
        - sanctum: []
      parameters:
        - $ref: "#/components/parameters/QueryFilters"
        - $ref: "#/components/parameters/QueryOrderBy"
        - $ref: "#/components/parameters/QueryPerPage"
      responses:
        "200":
          description: Coleção paginada (`UserResource`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPaginator"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    post:
      tags: [Usuários]
      summary: Criar usuário
      operationId: usersStore
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserWrite"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWrapped"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
        "422":
          $ref: "#/components/responses/ErroValidacao"

  /users/register:
    post:
      tags: [Usuários]
      summary: Registrar empresa e primeiro usuário
      operationId: usersRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRegisterBody"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWrapped"
        "422":
          $ref: "#/components/responses/ErroValidacao"
        "500":
          description: Erro interno (credenciais ou falha não mapeada)

  /users/login:
    post:
      tags: [Usuários]
      summary: Login (token Sanctum)
      operationId: usersLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserLoginBody"
      responses:
        "201":
          description: "O campo data.token contém o bearer token."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWrapped"
        "422":
          $ref: "#/components/responses/ErroValidacao"
        "500":
          description: Credenciais inválidas ou erro não tratado como 401

  /users/{id}:
    parameters:
      - $ref: "#/components/parameters/UserId"
    get:
      tags: [Usuários]
      summary: Obter usuário por ID
      operationId: usersShow
      security:
        - sanctum: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWrapped"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    put:
      tags: [Usuários]
      summary: Atualizar usuário
      description: |
        `password` opcional; omitido ou nulo mantém a senha atual.
      operationId: usersUpdate
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserWriteUpdate"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWrapped"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
        "422":
          $ref: "#/components/responses/ErroValidacao"
    patch:
      tags: [Usuários]
      summary: Atualizar usuário (parcial)
      operationId: usersPatch
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserWriteUpdate"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWrapped"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
        "422":
          $ref: "#/components/responses/ErroValidacao"
    delete:
      tags: [Usuários]
      summary: Excluir usuário
      operationId: usersDestroy
      security:
        - sanctum: []
      responses:
        "204":
          description: Sem corpo
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

components:
  securitySchemes:
    sanctum:
      type: http
      scheme: bearer
      bearerFormat: Token de acesso pessoal (Sanctum)
      description: Token retornado em `POST /users/login` (`data.token`).

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    UserId:
      name: id
      in: path
      required: true
      description: Identificador do usuário (PK).
      schema:
        type: integer
        minimum: 1
    QueryFilters:
      name: filters
      in: query
      description: Critérios de filtro (chave/valor por campo do modelo).
      schema:
        type: object
        additionalProperties: true
      style: form
      explode: true
    QueryOrderBy:
      name: orderBy
      in: query
      description: Ordenação por campo (`asc` ou `desc`).
      schema:
        type: object
        additionalProperties:
          type: string
          enum: [asc, desc]
      style: form
      explode: true
    QueryPerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 15

  responses:
    NaoAutorizado:
      description: Não autenticado (Sanctum)
    NaoEncontrado:
      description: Recurso não encontrado ou empresa não resolvida
    ErroValidacao:
      description: Erro de validação do Laravel
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/LaravelValidationError"

  schemas:
    TenantSettingsWrite:
      type: object
      required: [settings]
      properties:
        settings:
          type: object
          additionalProperties: true
          description: Mapa de chave da configuração para valor (tipos conforme `type` de cada chave)

    TenantSettingField:
      type: object
      required: [key, label, type, value, default_value]
      properties:
        key:
          type: string
        label:
          type: string
        description:
          type: string
          nullable: true
        type:
          type: string
          enum: [string, boolean, number, select, json]
        value:
          nullable: true
          description: Valor resolvido conforme `type`
        default_value:
          nullable: true
          description: Valor padrão do schema
        options:
          type: array
          items:
            type: string
          nullable: true

    TenantSettingsGrouped:
      type: object
      additionalProperties:
        type: array
        items:
          $ref: "#/components/schemas/TenantSettingField"

    TenantSettingsWrapped:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/TenantSettingsGrouped"

    JsonDataObject:
      type: object
      required: [data]
      description: Resposta `JsonResource` com envelope `data`.
      properties:
        data:
          type: object
          additionalProperties: true

    ResourcePaginator:
      type: object
      description: Coleção paginada Laravel (`Resource::collection` + paginator).
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: true
        links:
          type: object
          properties:
            first:
              type: string
              format: uri
              nullable: true
            last:
              type: string
              format: uri
              nullable: true
            prev:
              type: string
              format: uri
              nullable: true
            next:
              type: string
              format: uri
              nullable: true
        meta:
          type: object
          properties:
            current_page:
              type: integer
            from:
              type: integer
              nullable: true
            last_page:
              type: integer
            path:
              type: string
            per_page:
              type: integer
            to:
              type: integer
              nullable: true
            total:
              type: integer

    ModalityWrite:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
          maxLength: 10000

    ClassGroupWrite:
      type: object
      required: [name, modality_id, teacher_person_id, weekdays, starts_at, ends_at]
      properties:
        name:
          type: string
          maxLength: 255
        modality_id:
          type: integer
        teacher_person_id:
          type: integer
        max_capacity:
          type: integer
          nullable: true
          minimum: 1
        weekdays:
          type: array
          minItems: 1
          items:
            type: integer
            enum: [0, 1, 2, 3, 4, 5, 6]
          description: Dias da semana (0 = domingo … 6 = sábado).
        starts_at:
          type: string
          description: Horário `HH:mm` ou `HH:mm:ss`.
          pattern: '^\d{2}:\d{2}(:\d{2})?$'
        ends_at:
          type: string
          description: Deve ser posterior a `starts_at`.
          pattern: '^\d{2}:\d{2}(:\d{2})?$'
        plan_ids:
          type: array
          items:
            type: integer

    EnrollmentCreate:
      type: object
      required:
        [student_person_id, class_group_id, starts_on, status, plan_id, billing_starts_on]
      properties:
        student_person_id:
          type: integer
        class_group_id:
          type: integer
        starts_on:
          type: string
          format: date
        ends_on:
          type: string
          format: date
          nullable: true
        status:
          type: string
          enum: [active, locked, cancelled]
        plan_id:
          type: integer
        billing_starts_on:
          type: string
          format: date

    EnrollmentUpdate:
      type: object
      properties:
        student_person_id:
          type: integer
        class_group_id:
          type: integer
        starts_on:
          type: string
          format: date
        ends_on:
          type: string
          format: date
          nullable: true
        status:
          type: string
          enum: [active, locked, cancelled]
        plan_id:
          type: integer
          nullable: true
        billing_starts_on:
          type: string
          format: date
          nullable: true

    PlanWrite:
      type: object
      required: [name, price, billing_cycle, billing_interval]
      properties:
        name:
          type: string
          maxLength: 255
        price:
          type: number
          minimum: 0
        billing_cycle:
          type: string
          enum: [month, year]
        billing_interval:
          type: integer
          minimum: 1

    SubscriptionUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [canceled]

    InvoiceUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [paid]

    PaymentAttributes:
      type: object
      properties:
        id:
          type: integer
        company_id:
          type: integer
        invoice_id:
          type: integer
        gateway:
          type: string
        gateway_payment_id:
          type: string
        status:
          type: string
          enum: [pending, approved, cancelled]
        payment_url:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    PaymentWrapped:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/PaymentAttributes"

    PersonWrite:
      type: object
      required: [full_name, birth_date, phone, email, status, profile]
      properties:
        full_name:
          type: string
          maxLength: 255
        birth_date:
          type: string
          format: date
          description: Data anterior a hoje.
        cpf:
          type: string
          nullable: true
          description: 11 dígitos numéricos, sem máscara.
          pattern: "^[0-9]{11}$"
        phone:
          type: string
          description: 10 a 13 dígitos numéricos.
          pattern: "^[0-9]{10,13}$"
        email:
          type: string
          format: email
        guardian_person_id:
          type: integer
          nullable: true
          description: Obrigatório para aluno menor de idade; omitido para professor.
        status:
          type: string
          enum: [active, inactive]
        notes:
          type: string
          nullable: true
          maxLength: 10000
        profile:
          type: string
          enum: [student, teacher]
        modality_ids:
          type: array
          maxItems: 50
          items:
            type: integer
          description: Apenas quando `profile` = `teacher`.

    UserAttributes:
      type: object
      required: [id, name, email, created_at, updated_at]
      properties:
        id:
          type: integer
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
        token:
          type: string
          nullable: true
          description: Presente após o login (Sanctum).
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    UserWrapped:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/UserAttributes"

    UserPaginator:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/UserAttributes"
        links:
          type: object
          properties:
            first:
              type: string
              format: uri
              nullable: true
            last:
              type: string
              format: uri
              nullable: true
            prev:
              type: string
              format: uri
              nullable: true
            next:
              type: string
              format: uri
              nullable: true
        meta:
          type: object
          properties:
            current_page:
              type: integer
            from:
              type: integer
              nullable: true
            last_page:
              type: integer
            path:
              type: string
            per_page:
              type: integer
            to:
              type: integer
              nullable: true
            total:
              type: integer

    UserWrite:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    UserWriteUpdate:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
        password:
          type: string
          nullable: true
          minLength: 8

    UserRegisterBody:
      type: object
      required: [company, user]
      properties:
        company:
          type: object
          required: [name, email, phone]
          properties:
            name:
              type: string
              maxLength: 255
            email:
              type: string
              format: email
            phone:
              type: string
              maxLength: 255
        user:
          type: object
          required: [name, email, password]
          properties:
            name:
              type: string
              maxLength: 255
            email:
              type: string
              format: email
            password:
              type: string
              minLength: 8

    UserLoginBody:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LaravelValidationError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
