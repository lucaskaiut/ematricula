      tags: [Assinaturas]
      summary: Listar assinaturas (paginado)
      description: Carrega relações `enrollment.student` e `plan` na listagem.
      operationId: subscriptionsIndex
      security:
        - sanctum: []
      parameters:
        - $ref: "#/components/parameters/QueryFilters"
        - $ref: "#/components/parameters/QueryOrderBy"
        - $ref: "#/components/parameters/QueryPerPage"
      responses:
