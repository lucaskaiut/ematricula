        "404":
          $ref: "#/components/responses/NaoEncontrado"
    put:
      tags: [Matrículas]
      summary: Atualizar matrícula
      description: |
        Campos omitidos são preenchidos com os valores atuais do registro antes da validação.
      operationId: enrollmentsUpdate
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
