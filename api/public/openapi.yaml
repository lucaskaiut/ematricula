openapi: 3.0.3
info:
  title: API eMatrícula
  description: |
    Rotas HTTP definidas em `routes/api.php`. A URL em `servers` já inclui o prefixo `/api` do Laravel;
    os caminhos abaixo são relativos a essa base.

    **Autenticação:** rotas protegidas usam **Laravel Sanctum** (`Authorization: Bearer <token>`) e o middleware
    `InitializeCompany`: o usuário precisa estar vinculado a uma empresa; caso contrário a API pode responder
    com **404** (empresa não resolvida).

    **Listagens:** endpoints `index` aceitam `filters`, `orderBy` e `per_page` na query (padrão dos serviços internos).
  version: 1.0.0

servers:
  - url: http://localhost:8080/api
    description: Docker Compose (nginx, HTTP)
  - url: http://localhost/api
    description: Ambiente local (ajuste host/porta se necessário)

tags:
  - name: Sessão
    description: Usuário autenticado
  - name: Modalidades
  - name: Turmas
  - name: Matrículas
  - name: Planos
  - name: Assinaturas
  - name: Faturas
  - name: Pagamentos
  - name: Pessoas
  - name: Usuários
    description: Gestão de usuários (autenticado) e registro/login público
  - name: Configurações
    description: Configurações dinâmicas por empresa (tenant)

paths:
  /user/me:
    get:
      tags: [Sessão]
      summary: Perfil do usuário autenticado
      operationId: userMe
      security:
        - sanctum: []
      responses:
        "200":
          description: OK (`UserResource` em `data`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWrapped"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /settings:
    get:
      tags: [Configurações]
      summary: Listar configurações do tenant (agrupadas)
      description: |
        Retorna todas as definições com valores resolvidos (override do tenant ou `default_value`).
        Chaves de primeiro nível em `data` são os grupos (`general`, `invoice`, etc.).
      operationId: tenantSettingsIndex
      security:
        - sanctum: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantSettingsWrapped"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    put:
      tags: [Configurações]
      summary: Atualizar configurações em lote
      description: |
        Corpo `settings` é um mapa `chave` → valor. Use `null` para remover override e voltar ao padrão.
      operationId: tenantSettingsUpdate
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantSettingsWrite"
      responses:
        "200":
          description: OK (mesmo formato do GET)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantSettingsWrapped"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
        "422":
          description: Validação Laravel ou regra de negócio (chave desconhecida, tipo inválido)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /modalities:
    get:
      tags: [Modalidades]
      summary: Listar modalidades (paginado)
      operationId: modalitiesIndex
      security:
        - sanctum: []
      parameters:
        - $ref: "#/components/parameters/QueryFilters"
        - $ref: "#/components/parameters/QueryOrderBy"
        - $ref: "#/components/parameters/QueryPerPage"
      responses:
        "200":
          description: Coleção paginada (`ModalityResource`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourcePaginator"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    post:
      tags: [Modalidades]
      summary: Criar modalidade
      operationId: modalitiesStore
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModalityWrite"
      responses:
        "201":
          description: Criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonDataObject"
        "401":
          $ref: "#/components/responses/NaoAutorizado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
        "422":
          $ref: "#/components/responses/ErroValidacao"

  /modalities/{id}:
